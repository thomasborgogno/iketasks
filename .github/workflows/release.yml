# Automated build and release on every push to master.
#
# REQUIRED GitHub Secrets (Settings → Secrets and variables → Actions):
#   GOOGLE_SERVICES_JSON  — base64-encoded content of android/app/google-services.json
#                           Generate: base64 -w 0 android/app/google-services.json
#
#   KEYSTORE_JKS          — base64-encoded release keystore (.jks)
#                           Generate keystore once (do this locally):
#                             keytool -genkey -v \
#                               -keystore eisenhower-keystore.jks \
#                               -alias eisenhower \
#                               -keyalg RSA -keysize 2048 -validity 10000
#                           Then encode: base64 -w 0 eisenhower-keystore.jks
#
#   KEYSTORE_PASSWORD     — password used when generating the keystore
#   KEY_ALIAS             — alias used when generating the keystore (e.g. eisenhower)
#   KEY_PASSWORD          — key password (can be same as KEYSTORE_PASSWORD)
#
# VERSION STRATEGY: patch version auto-incremented on every push (e.g. 1.0.0 → 1.0.1).
# build number = github.run_number. Version is passed directly to flutter build — pubspec.yaml
# is never modified. Bump major/minor manually in pubspec.yaml when needed.

name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-and-release:
    # Skip if the commit was generated by this workflow itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_JKS }}" | base64 --decode > ${{ github.workspace }}/eisenhower-keystore.jks

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Check auto-fixable issues
        run: dart fix --dry-run

      - name: Compute version
        id: version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml)
          VERSION_NAME=$(echo "$VERSION_LINE" | sed 's/version: //' | cut -d'+' -f1)
          MAJOR=$(echo "$VERSION_NAME" | cut -d'.' -f1)
          MINOR=$(echo "$VERSION_NAME" | cut -d'.' -f2)
          PATCH=$(echo "$VERSION_NAME" | cut -d'.' -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_CODE=${{ github.run_number }}
          echo "version_name=${NEW_VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${NEW_CODE}"          >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION_NAME}"          >> "$GITHUB_OUTPUT"

      - name: Build APKs (split per ABI)
        env:
          KEYSTORE_PATH:     ${{ github.workspace }}/eisenhower-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi --build-name=${{ steps.version.outputs.version_name }} --build-number=${{ steps.version.outputs.version_code }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version_name }}"
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
