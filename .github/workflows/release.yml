# Automated build and release on every push to master.
#
# REQUIRED GitHub Secrets (Settings → Secrets and variables → Actions):
#   GOOGLE_SERVICES_JSON  — base64-encoded content of android/app/google-services.json
#                           Generate: base64 -w 0 android/app/google-services.json
#
#   KEYSTORE_JKS          — base64-encoded release keystore (.jks)
#                           Generate keystore once (do this locally):
#                             keytool -genkey -v \
#                               -keystore eisenhower-keystore.jks \
#                               -alias eisenhower \
#                               -keyalg RSA -keysize 2048 -validity 10000
#                           Then encode: base64 -w 0 eisenhower-keystore.jks
#
#   KEYSTORE_PASSWORD     — password used when generating the keystore
#   KEY_ALIAS             — alias used when generating the keystore (e.g. eisenhower)
#   KEY_PASSWORD          — key password (can be same as KEYSTORE_PASSWORD)
#
# VERSION STRATEGY: patch auto-incremented on every push based on the latest git tag.
# If no tag exists yet, pubspec.yaml version is used as the base.
# build number = github.run_number (always unique).
# Git tag format: v{major}.{minor}.{patch}+{run_number} (e.g. v1.0.7+52).
# To bump major/minor: push a manual tag v2.0.0+0 — next build will increment from there.

name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-and-release:
    # Skip if the commit was generated by this workflow itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_JKS }}" | base64 --decode > ${{ github.workspace }}/eisenhower-keystore.jks

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Analyze code
        run: flutter analyze

      - name: Compute version
        id: version
        run: |
          # Find the latest semver tag (format vX.Y.Z or vX.Y.Z+N)
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
            | sort -t. -k1,1V -k2,2n -k3,3n \
            | tail -1)

          if [ -z "$LATEST_TAG" ]; then
            # No tag yet — use pubspec.yaml as base, patch stays as-is
            BASE=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          else
            # Strip leading 'v' and build suffix (+N)
            BASE=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d'+' -f1)
            # Increment patch
            MAJOR=$(echo "$BASE" | cut -d'.' -f1)
            MINOR=$(echo "$BASE" | cut -d'.' -f2)
            PATCH=$(echo "$BASE" | cut -d'.' -f3)
            BASE="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          VERSION_CODE=${{ github.run_number }}
          echo "version_name=${BASE}"                  >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}"          >> "$GITHUB_OUTPUT"
          echo "tag=v${BASE}+${VERSION_CODE}"          >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
            | sort -t. -k1,1V -k2,2n -k3,3n \
            | tail -1)

          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi

          if [ -z "$LOG" ]; then
            LOG="- No changes recorded"
          fi

          # Write to file to avoid multiline env-var quoting issues
          echo "## What's changed" > changelog.md
          echo "" >> changelog.md
          echo "$LOG" >> changelog.md

      - name: Build APKs (split per ABI)
        env:
          KEYSTORE_PATH:     ${{ github.workspace }}/eisenhower-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi --build-name=${{ steps.version.outputs.version_name }} --build-number=${{ steps.version.outputs.version_code }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }})"
          body_path: changelog.md
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
