sonar.projectName=iketasks
sonar.sources=lib
sonar.tests=test
sonar.test.inclusions=test/**
sonar.sourceEncoding=UTF-8

# Flutter/Dart coverage generated by `flutter test --coverage`
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Ignore generated and build artifacts
sonar.exclusions=**/.dart_tool/**,**/build/**,**/generated/**,**/*.g.dart,**/*.freezed.dart
