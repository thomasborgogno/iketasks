# Automated build and release on every push to master.
#
# REQUIRED GitHub Secrets (Settings → Secrets and variables → Actions):
#   GOOGLE_SERVICES_JSON  — base64-encoded content of android/app/google-services.json
#                           Generate: base64 -w 0 android/app/google-services.json
#
#   KEYSTORE_JKS          — base64-encoded release keystore (.jks)
#                           Generate keystore once (do this locally):
#                             keytool -genkey -v \
#                               -keystore eisenhower-keystore.jks \
#                               -alias eisenhower \
#                               -keyalg RSA -keysize 2048 -validity 10000
#                           Then encode: base64 -w 0 eisenhower-keystore.jks
#
#   KEYSTORE_PASSWORD     — password used when generating the keystore
#   KEY_ALIAS             — alias used when generating the keystore (e.g. eisenhower)
#   KEY_PASSWORD          — key password (can be same as KEYSTORE_PASSWORD)
#
# VERSION STRATEGY: build number increments on every push.
# Version name (1.0.0) changes only via manual pubspec.yaml edits.

name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-and-release:
    # Skip if the commit was generated by this workflow itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_JKS }}" | base64 --decode > ${{ github.workspace }}/eisenhower-keystore.jks

      - name: Install dependencies
        run: flutter pub get

      - name: Bump build number
        id: version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml)
          VERSION_NAME=$(echo "$VERSION_LINE" | sed 's/version: //' | cut -d'+' -f1)
          VERSION_CODE=$(echo "$VERSION_LINE" | cut -d'+' -f2)
          NEW_CODE=$((VERSION_CODE + 1))
          NEW_VERSION="${VERSION_NAME}+${NEW_CODE}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${NEW_CODE}"     >> "$GITHUB_OUTPUT"
          echo "full_version=${NEW_VERSION}"  >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}-b${NEW_CODE}" >> "$GITHUB_OUTPUT"

      - name: Commit bumped version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.version.outputs.full_version }} [skip ci]"
          git push

      - name: Build APKs (split per ABI)
        env:
          KEYSTORE_PATH:     ${{ github.workspace }}/eisenhower-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }})"
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
